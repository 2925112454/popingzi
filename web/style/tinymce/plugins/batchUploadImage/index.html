<head>
    <meta charset="utf-8">
    <title>批量上传图片</title>
    <meta name="viewport" content="user-scalable=no,width=device-width,initial-scale=1,maximum-scale=1">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Oxygen-Sans, Ubuntu, Cantarell, Helvetica Neue, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: rgba(34, 47, 62, .7);
            height: 100vh;
            margin: 0

        button {
            font: inherit;

        }

        button:disabled {
            cursor: not-allowed
        }

        .button {
            color: #222f3e;
            padding: 4px 16px;
            background-color: #f0f0f0;
            border: 1px solid #f0f0f0;
            border-radius: 3px
        }

        .button:hover {
            color: #222f3e;
            background-color: #e3e3e3;
            border-color: #e3e3e3
        }

        .button:disabled {
            color: rgba(34, 47, 62, .5);
            background-color: #f0f0f0;
            border-color: #f0f0f0
        }

        .button+.button {
            margin-left: 4px
        }

        .primary {
            color: #fff;
            background-color: #006ce7;
            border-color: #006ce7
        }

        .primary:hover {
            color: #fff;
            background-color: #0060ce;
            border-color: #0060ce
        }

        .footer,
        .header {
            padding: 8px 16px;
            display: flex;
            justify-content: space-between
        }

        .header {
            border-bottom: 1px solid #ccc
        }

        .footer {
            border-top: 1px solid #ccc

        .tip {
            margin-left: 4px;
            font-size: 12px;

        .main {

            overflow-y: auto

            object-fit: scale-down;

        }

            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

            position: absolute;
            top: 6px;
            right: 6px;
            z-index: 2;
            cursor: pointer;
            display: none

<body>
    <div class="header">
        <div class="header-start"><button id="choose" class="button primary">选择图片</button> <span
                class="tip">支持上传JPG、PNG、GIF、WEBP、AVIF格式，一次最多上传10张图片,单张图片不能超过1MB。</span></div>
        <div class="header-end"><button id="upload" class="button">批量上传</button></div>
    </div>
    <div id="main" class="main">
        <ul id="list" class="list"></ul>
    </div>
    <div class="footer">
        <div class="footer-start"></div>
        <div class="footer-end"><button id="cancel" class="button">取消</button> <button id="empty"
                class="button">清空列表</button> <button id="insert" class="button primary">全部插入</button></div>
    </div>
    <script>
        const { editor, dialog } = parent.BatchUploadImage;

        const images_upload_url = "/api/upimg.php";
        const uploadHandler = function (data, callback, fail) {
            // 上传图片
            var xhr = new XMLHttpRequest()
            xhr.open("post", images_upload_url, true)
            xhr.onload = function () {

                if (xhr.status == 500) {// 请求失败
                    fail(-1);
                } else {
                    const json = JSON.parse(xhr.responseText);
                    if (!json || typeof json.location != 'string') {
                        fail(-1);
                    } else {
                        if (xhr.readyState == 4 && xhr.status == 200) {// 请求成功
                            var response = JSON.parse(xhr.responseText)
                            callback(response.location)
                        } else {
                            fail(-1);
                        }
                    }

                }


            }
            var formdata = new FormData();
            formdata.append("file", data.file);
            xhr.send(formdata);

        }
        const fileType = editor.getParam('batch_upload_image_type', ['jpg', 'jpeg', 'png', 'gif','webp','avif'], 'array');
        const accept = fileType.map(type => `.${type}`).toString();
        const uploadButton = document.querySelector('#upload');
        const list = document.querySelector('#list');
        const images = [];
        // 选择图片
        document.querySelector('#choose').addEventListener('click', () => {
            const input = document.createElement('input');
            input.setAttribute('type', 'file');
            input.setAttribute('multiple', 'multiple');
            input.setAttribute('accept', accept);
            input.onchange = function () {
                checkImage(this.files);
            }
            input.click();
        });
        // 选择图片
        uploadButton.addEventListener('click', function () {
            let length = 0;
            images.forEach(v => {
                if (v.url === '') {
                    length++;
                    if (v.state === -1) {
                        v.state = 0;
                    }
                }
            });

            if (length) {
                this.disabled = true;
                uploadQueue();
            }
        });

        document.querySelector('#cancel').addEventListener('click', () => {
            dialog.close();
        });

        document.querySelector('#empty').addEventListener('click', () => {
            document.querySelector('#list').innerHTML = '';
            images.length = 0;
        });

        document.querySelector('#insert').addEventListener('click', () => {
            if (images.length) {
                let html = '';
                images.forEach(img => {
                    if (img.url) {
                        html += `<img src="${img.url}" alt="" /><br>`;
                    }
                });
                editor.insertContent(html);
                images.length = 0;
            }
            dialog.close();
        });
        // 拖拽上传
        document.addEventListener('dragover', e => e.preventDefault());
        document.querySelector('#main').addEventListener('drop', function (e) {
            e.preventDefault();
            checkImage(e.dataTransfer.files);
        });
        // 移除图片
        list.addEventListener('click', ({ target }) => {
            if (target.classList.contains('remove')) {
                let index = Array.from(list.querySelectorAll('.remove')).indexOf(target);
                list.removeChild(target.parentElement);
                delete images.splice(index, 1);
            }
        });
        // 获取文件后缀
        function ext(filename) {
            return filename.split('.').pop();
        }
        // 检查图片
        function checkImage(files) {
            if (files.length <= 10) {// 检查文件类型
                const _files = Array.from(files).filter(file => fileType.indexOf(ext(file.name)) > -1);
                let items = _files.map(file => {
                    let blobUrl = window.URL.createObjectURL(file);
                    images.push({ file: file, blobUrl: blobUrl, url: '', state: 0 });
                    return `<li class="item" data-state="0"><img class="image" src="${blobUrl}" alt=""><div class="name" title="${file.name}">${file.name}</div><span class="remove"></span></li>`;
                });
                list.innerHTML += items.join('');
            }else{
                alert('一次最多上传10张图片');
            }
        }
        // 上传队列
        function uploadQueue() {
            let index = images.findIndex(v => v.state === 0);
            if (index === -1) {
                uploadButton.disabled = false;
                return;
            }

            let item = list.querySelectorAll('li')[index];
            item.dataset.state = '1';

            const img = images[index];
            const data = {
                file: img.file,
                blob: () => img.file
            };
            uploadHandler(data, function (url) {
                img.url = url;
                img.state = 2;
                item.dataset.state = '2';// 上传成功
                uploadQueue();
            }, function () {
                img.state = -1;
                item.dataset.state = '-1';// 上传失败
                item.querySelector('.name').innerHTML = "<span style='color:red'>文件体积超过限制</span>";
                uploadQueue();
            });
        }
    </script>
</body>

</html>
